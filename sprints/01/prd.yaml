meta:
  version: "0.1"
  last_updated: "2025-10-17"
problem:
  statement: "Az indie írók számára a professzionális könyvborító készítése időigényes, drága vagy technikai akadályokba ütközik, ami késlelteti a megjelenést és csökkenti a könyv piaci versenyképességét."
target_audience:
  personas:
    - name: "Eszter, kezdő szerző"
      segment: "25-35 éves indie író, aki első fantasy regényét készíti munkája mellett"
      context: "Nincs design tapasztalata, kis költségvetéssel gazdálkodik, és gyorsan szeretne piacra lépni Amazon KDP-n."
      needs:
        - "Intuitív, mobil-barát felület"
        - "Professzionális eredmény design ismeretek nélkül"
        - "Gyors borítógenerálás kis költségvetéssel"
    - name: "Kata, a gyerekkönyv-író"
      segment: "28-40 éves produktív szerző, aki évente 20-30 gyerekkönyvet ad ki"
      context: "Mesekönyveket ír 3-8 éveseknek. Fontos számára a színes, barátságos vizualitás és a gyors munkamenet a sok könyvhöz."
      needs:
        - "Vidám, színes, gyerekbarát design stílusok"
        - "Karakterkonzisztencia több könyv borítóján"
        - "Több borító egyidejú kezelése"
value_proposition:
  concise: "Az InstaCover egy AI-alapú borítógeneráló platform, amely egy egyszerű prompt vagy könyvfeltöltés alapján pár perc alatt készít piackész borítókat, így az írók 90%-kal olcsóbban és 10x gyorsabban jutnak professzionális designhoz a hagyományos grafikusokhoz képest."
  differentiators:
    - "Személyre szabható LoRA modellek karakterek és stílusok konzisztens megjelenítéséhez"
    - "Teljes borító generálás egy lépésben (vizuális + tipográfia + formátum)"
    - "Több borító egyidejű kezelése"
scope:
  in:
    - "AI borítógenerálás prompt alapján"
    - "LoRA modell training egyedi karakterekhez és vizuális stílushoz"
    - "Sorozat-konzisztencia (ugyanaz a karakter/stílus több borítón)"
    - "SVG szerző név/logo feltöltés és elhelyezés"
    - "Exportálás különböző formátumokban"
  out:
    - "Belső könyvdesign (oldalszámozás, tipográfia, fejezetkezdet)"
    - "Automatikus feltöltés publikáló platformokra (KDP, Draft2Digital stb.)"
    - "Print-on-demand integráció"
    - "Előre gyártott sablonok és műfaj-specifikus template-ek"
success_metrics:
  - "15 early KDP adopter"
  - "Felhasználói elégedettség ≥4.5/5 a generált borítók minőségével"
  - "70%-a a felhasználóknak képes használható borítót létrehozni 15 percen belül"
  - "≥20% konverziós arány ingyenes tesztelőből fizető előfizetővé"
risks:
  - "Erős közösségi ellenállás az indie írók körében az AI-generált művészeti munkákkal szemben"
  - "Szerzői jogi és etikai kérdések a LoRA training adatok forrásával kapcsolatban"
  - "Amazon/KDP policy változások az AI-generált borítók közzétételére vonatkozóan"
  - "Alacsony adoption rate az anti-AI attitűd miatt a célközönségben"
  - "Verseny meglévő eszközökkel amelyek nem AI-alapúak"
first_tech_decision_ref: "sprints/01/architecture/adr/0001-first-tech-choice.md"
research_summary:
  insights:
    - "57% vásárol könyvet kizárólag a borító alapján, 80% elkerül könyveket rossz borító miatt"
    - "Indie szerzők jelentős része először DIY megoldásokat próbál költségvetési okokból"
    - "Professzionális custom borító ára $200-600, premade covers $100-150, kezdő szerzőknek visszatartó"
    - "Borítótervezés átlagosan 27-45 óra munka, revision rounds további heteket adnak hozzá"
    - "Műfaj-specifikus vizuális konvenciók (cover tropes) kritikusak az eladásokhoz: romance = pasztell + párok, thriller = sötét + feszültség"
  pain_points:
    - "Professzionális borító költsége ($200-600) megfizethetetlen új indie szerzőknek"
    - "Hosszú átfutási idő grafikusokkal (hetek a revision rounds-okkal)"
    - "Nehéz verbálisan kommunikálni a vizuális elképzeléseket designerekkel"
    - "DIY tools sablon-alapúak, nem generálnak teljes borítót"
    - "Nincs konzisztencia több borítónál sorozatoknál DIY vagy különböző grafikusokkal"
